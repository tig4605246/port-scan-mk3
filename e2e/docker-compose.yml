services:
  mock-target-open:
    build:
      context: ./mock-target-open
    networks:
      e2e-net:
        ipv4_address: 172.28.0.10

  mock-target-closed:
    build:
      context: ./mock-target-closed
    networks:
      e2e-net:
        ipv4_address: 172.28.0.11

  scanner:
    build:
      context: ..
      dockerfile: e2e/scanner/Dockerfile
    networks:
      e2e-net: {}
    volumes:
      - ./inputs:/inputs
      - ./out:/out

  pressure-api-ok:
    build:
      context: ..
      dockerfile: e2e/mock-pressure-api/Dockerfile
    environment:
      MODE: ok
      PRESSURE: 20
    networks:
      e2e-net: {}

  pressure-api-5xx:
    build:
      context: ..
      dockerfile: e2e/mock-pressure-api/Dockerfile
    environment:
      MODE: fail
    networks:
      e2e-net: {}

  pressure-api-timeout:
    build:
      context: ..
      dockerfile: e2e/mock-pressure-api/Dockerfile
    environment:
      MODE: timeout
      DELAY_MS: 5000
      PRESSURE: 20
    networks:
      e2e-net: {}

networks:
  e2e-net:
    driver: bridge
    ipam:
      config:
        - subnet: 172.28.0.0/24
